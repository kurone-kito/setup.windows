# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
properties:
  assertions:
    - resource: Microsoft.Windows.Developer/OsVersion
      directives:
        description: Require Windows 10 22H2 (build 19045) or later
        allowPrerelease: true
      settings:
        MinVersion: "10.0.19045"
  configurationVersion: 0.2.0
  resources:
    - resource: PSDscResources/Registry
      id: windows11-native-nvme-driver-1
      directives:
        description: Windows11 Native NVMe Driver 1
        securityContext: elevated
      settings:
        Ensure: "Present"
        Key: "HKLM:\\SYSTEM\\CurrentControlSet\\Policies\\Microsoft\\FeatureManagement\\Overrides"
        ValueData: "1"
        ValueName: "156965516"
        ValueType: "DWord"

    - resource: PSDscResources/Registry
      id: windows11-native-nvme-driver-2
      directives:
        description: Windows11 Native NVMe Driver 2
        securityContext: elevated
      settings:
        Ensure: "Present"
        Key: "HKLM:\\SYSTEM\\CurrentControlSet\\Policies\\Microsoft\\FeatureManagement\\Overrides"
        ValueData: "1"
        ValueName: "735209102"
        ValueType: "DWord"

    - resource: PSDscResources/Registry
      id: windows11-native-nvme-driver-3
      directives:
        description: Windows11 Native NVMe Driver 3
        securityContext: elevated
      settings:
        Ensure: "Present"
        Key: "HKLM:\\SYSTEM\\CurrentControlSet\\Policies\\Microsoft\\FeatureManagement\\Overrides"
        ValueData: "1"
        ValueName: "1853569164"
        ValueType: "DWord"

    - resource: PSDscResources/Registry
      id: windows11-native-nvme-driver-fallback-in-minimal-safe-mode
      directives:
        description: Windows11 Native NVMe Driver fallback in minimal safe mode
        securityContext: elevated
      settings:
        Ensure: "Present"
        Key: "HKLM:\\SYSTEM\\CurrentControlSet\\Control\\SafeBoot\\Minimal\\{75416E63-5912-4DFA-AE8F-3EFACCAFFB14}"
        ValueData:
          - Storage Disks
        ValueName: ""
        ValueType: "String"

    - resource: PSDscResources/Registry
      id: windows11-native-nvme-driver-fallback-in-with-networking-safe-mode
      directives:
        description: Windows11 Native NVMe Driver fallback in with networking safe mode
        securityContext: elevated
      settings:
        Ensure: "Present"
        Key: "HKLM:\\SYSTEM\\CurrentControlSet\\Control\\SafeBoot\\Network\\{75416E63-5912-4DFA-AE8F-3EFACCAFFB14}"
        ValueData:
          - Storage Disks
        ValueName: ""
        ValueType: "String"

