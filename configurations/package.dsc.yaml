    # =======================================================================
    # Windows Capabilities
    # Resource: ComputerManagementDsc/WindowsCapability
    #
    # These are "Features on Demand" (FoD) managed via Add-WindowsCapability,
    # distinct from WindowsOptionalFeature above.
    # Capability names use the format: Name~~~~Version (e.g., ~~~~0.0.1.0)
    #
    # IMPORTANT NOTES:
    # - Requires internet access (Windows Update) to download capability
    #   packages unless an offline source is configured.
    # - ComputerManagementDsc module is automatically downloaded from
    #   PSGallery by winget configure.
    # - Some capabilities may require a reboot after installation.
    #
    # Edition legend:
    #   [All]  = Windows 10/11, all editions (Home/Pro/Enterprise/Education)
    #   [Pro+] = Windows 10/11, Pro/Enterprise/Education only
    #
    # Version legend:
    #   [Win10/11] = Available on both (default, not annotated)
    #   [Win11]    = Windows 11 only
    #   [Win10]    = Windows 10 only (removed or replaced in Win11)
    # =======================================================================

